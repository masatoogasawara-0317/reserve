<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Schedule</title>
    <style>
        body {
            background-color: #121212;
            color: #d4af37; /* ゴールドの文字色 */
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
        }
        /* シフト表のスタイル */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        tr {
            border-bottom: 1px solid #333;
        }
        td {
            padding: 12px;
        }
        .date {
            font-weight: bold;
        }
        .time {
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SCHEDULE</h1>

    <!-- 自動更新プログラムがこのタグの間を書き換えます -->
    <!-- SHIFT_START -->
    <table>
        <tr>
            <td class="date">07/17</td>
            <td class="time">読み込み中...</td>
        </tr>
    </table>
    <!-- SHIFT_END -->

</div>

</body>
</html>
