<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story - Premium Profile</title>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 漆黒とシャンパンゴールドのラグジュアリーデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #e6e6e6;
            text-align: center;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 30px 20px 50px 20px;
            box-sizing: border-box;
        }
        /* プロフィールヘッダー */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 15px;
        }
        h1 {
            font-size: 22px;
            color: #D4AF37;
            margin: 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.2);
        }
        .subtitle {
            font-size: 12px;
            color: #8c8c8c;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        /* スケジュールエリア */
        .schedule-box {
            background: linear-gradient(135deg, #141414, #1a1a1a);
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 20px 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: left;
        }
        .schedule-header {
            font-size: 14px;
            font-weight: bold;
            color: #D4AF37;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        /* 自動取得するスケジュール表のスタイル */
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .schedule-table tr {
            border-bottom: 1px solid #222;
        }
        .schedule-table tr:last-child {
            border-bottom: none;
        }
        .schedule-table td {
            padding: 10px 5px;
        }
        .day-col {
            font-weight: bold;
            color: #999;
            width: 35%;
        }
        .time-col {
            color: #e6e6e6;
            text-align: right;
            font-weight: 500;
        }
        .time-col.active {
            color: #D4AF37; /* 出勤日の時間をゴールドで強調 */
        }
        /* アクションボタン（メイン動線） */
        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #1b3322, #0d2113); /* 非常に深い高級感のあるグリーン */
            border: 1px solid #2d5437;
            color: #d4eade;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            margin-bottom: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        .main-btn:hover {
            opacity: 0.9;
        }
        .main-btn.counseling {
            background: linear-gradient(135deg, #262626, #1c1c1c); /* シックなチャコールブラック */
            border: 1px solid #3d3d3d;
            color: #d4af37;
        }
        /* 外部SNS等へのリンクグリッド */
        .sns-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 25px;
        }
        .sns-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #141414;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 6px;
            color: #b3b3b3;
            text-decoration: none;
            font-size: 13px;
            transition: 0.2s;
        }
        .sns-item:hover {
            border-color: #D4AF37;
            color: #D4AF37;
        }
        /* ローディングアニメーション */
        .loader {
            text-align: center;
            color: #888;
            font-size: 12px;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- プロフィールヘッダー -->
        <img src="https://www.story-tokyo.com/prof/prof61/img/main.jpg" alt="Profile Image" class="avatar" id="avatarImg">
        <h1>事前カウンセリング</h1>
        <div class="subtitle">〜 Premium Salon Story 〜</div>

        <!-- スケジュール表示ボックス（HPから自動取得） -->
        <div class="schedule-box">
            <div class="schedule-header">
                <i class="fa-regular fa-calendar-days"></i> SCHEDULE
            </div>
            <div id="scheduleContainer">
                <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> スケジュールを同期中...</div>
            </div>
        </div>

        <!-- メイン連携ボタン（設定していただいたLIFF IDが埋め込まれています） -->
        <a href="https://liff.line.me/2010733799-HH18a8xi" class="main-btn">
            <i class="fa-regular fa-calendar-check"></i> ⚜️ オンラインご予約
        </a>
        <a href="https://liff.line.me/2010734424-ydvrug0g" class="main-btn counseling">
            <i class="fa-regular fa-file-lines"></i> ⚜️ カウンセリングシート
        </a>

        <!-- SNS・外部リンクリスト -->
        <div class="sns-grid">
            <a href="https://www.story-tokyo.com/prof/prof61/" target="_blank" class="sns-item">
                <i class="fa-solid fa-globe"></i> 公式HP
            </a>
            <a href="https://line.me/ti/p/WKGoR7lHbY" class="sns-item">
                <i class="fa-brands fa-line"></i> お店LINE
            </a>
            <a href="https://x.com/yuu_story0?s=11" target="_blank" class="sns-item">
                <i class="fa-brands fa-x-twitter"></i> X (Twitter)
            </a>
            <a href="https://bsky.app/profile/yu-story.bsky.social" target="_blank" class="sns-item">
                <i class="fa-brands fa-bluesky"></i> Bluesky
            </a>
            <a href="https://www.instagram.com/yuu_story03?igsh=MTc2Y2M3bWViYm5wbg%3D%3D&utm_source=qr" target="_blank" class="sns-item">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a href="https://twitcasting.tv/c:yuu_story" target="_blank" class="sns-item">
                <i class="fa-solid fa-bullhorn"></i> ツイキャス
            </a>
            <a href="mailto:story.20241101@gmail.com" class="sns-item">
                <i class="fa-regular fa-envelope"></i> メール送信
            </a>
            <a href="tel:050-1720-1101" class="sns-item">
                <i class="fa-solid fa-phone"></i> 電話発信
            </a>
        </div>
    </div>

    <script>
        // LIFFの初期化
        liff.init({
            liffId: "2010735540-NyKzUI3c"
        }).catch((err) => {
            console.error('LIFFの初期化に失敗しました', err);
        });

        // 【自動同期スクリプト】
        const targetUrl = "https://www.story-tokyo.com/prof/prof61/";
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        fetch(proxyUrl)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Network response was not ok.');
            })
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // Story HP上のスケジュールテーブルを検索して引っ張ります
                const scheduleTable = doc.querySelector('.schedule_table, table'); 
                
                if (scheduleTable) {
                    let customHtml = '<table class="schedule-table">';
                    const rows = scheduleTable.querySelectorAll('tr');
                    
                    rows.forEach(row => {
                        const cols = row.querySelectorAll('td, th');
                        if (cols.length >= 2) {
                            const dayText = cols[0].textContent.trim();
                            const timeText = cols[1].textContent.trim();
                            const isActive = (timeText !== "お休み" && timeText !== "休み" && timeText !== "-" && timeText !== "") ? "active" : "";
                            
                            customHtml += `<tr>
                                <td class="day-col">${dayText}</td>
                                <td class="time-col ${isActive}">${timeText}</td>
                            </tr>`;
                        }
                    });
                    customHtml += '</table>';
                    document.getElementById('scheduleContainer').innerHTML = customHtml;

                    // メイン画像もHPから高画質なものを自動で持ってきて同期します
                    const mainImg = doc.querySelector('.prof_img img, .main_visual img');
                    if (mainImg && mainImg.src) {
                        let imgSrc = mainImg.getAttribute('src');
                        if (!imgSrc.startsWith('http')) {
                            imgSrc = 'https://www.story-tokyo.com/prof/prof61/' + imgSrc.replace(/^\.\//, '');
                        }
                        document.getElementById('avatarImg').src = imgSrc;
                    }
                } else {
                    document.getElementById('scheduleContainer').innerHTML = "<div class='loader'>HPからスケジュールを取得できませんでした。公式HPリンクよりご確認ください。</div>";
                }
            })
            .catch(error => {
                console.error("エラーが発生しました:", error);
                document.getElementById('scheduleContainer').innerHTML = "<div class='loader'>スケジュールの同期に失敗しました。</div>";
            });
    </script>
</body>
</html>
