<style>

body {

    color:#fff;
    font-family:

    sans-serif;
}

.container {
    max-width:480px;
    margin:auto;
    padding:35px 20px;
    text-align:center;
}


/* プロフィール画像 */

.profile-img {
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #c9a227;
    box-shadow:
    0 0 25px rgba(201,162,39,.35);

    margin-bottom:20px;
}



/* 名前 */

.name {

    font-size:30px;
    letter-spacing:5px;
    font-weight:300;

    color:#d4af37;

    margin:0;

}


.subtitle {

    font-size:13px;

    color:#999;

    margin-top:10px;

/* スケジュール */

    margin-top:40px;

}



.title {

    color:#d4af37;

    letter-spacing:3px;

    font-size:16px;

    margin-bottom:20px;

}



.schedule p {

    font-size:15px;

    line-height:2;

    color:#ddd;

}



/* ボタン */

.btn {

    display:block;

    margin:15px 0;

    padding:15px;

    border-radius:30px;

    text-decoration:none;

    color:#000;

    font-weight:bold;

    background:

    linear-gradient(

    135deg,

    #d4af37,

    #a67c00

    );



    box-shadow:

    0 5px 20px rgba(212,175,55,.25);

}



.btn.sub {

    background:#151515;

    color:#d4af37;

    border:1px solid #d4af37;

}



.footer {

    margin-top:40px;

    font-size:11px;

    color:#555;

}


</style>
