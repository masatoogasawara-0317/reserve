name: Update Shift Schedule

on:
  schedule:
    # 毎日 日本時間の朝7時、昼12時、夕方18時、夜22時に自動実行 (UTC換算)
    - cron: '0 22,3,9,13 * * *'
  workflow_dispatch: # ボタンを押して手動でいつでも実行できるようにする設定

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run shift fetcher
        run: node fetch_shift.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update shift from Story website" && git push)
